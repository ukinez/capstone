<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <div class="sun">
        <div id="sun"></div>
    </div>
    
    <div class="mercury">
        <div id="mercury"></div>
    </div>
    
    <div class="venus">
        <div id="venus"></div>
    </div>
    
    
    <div class="earth">
        <div id="earth"></div>
        <div class="moon">
            <div id="moon"></div>
        </div>
    </div>

    <div class="mars">
        <div id="mars"></div>
        <div class="phobos"></div>
        <div class="deimos"></div>
    </div>

    <div class="asteroidbelt1"></div>
    <div class="asteroidbelt2"></div>
    <div class="asteroidbelt3"></div> 
    <div class="ceres"></div>

    <div class="jupiter">
        <div id="jupiter"></div>
    </div>

    <div class="saturn">
        <div id="saturn"></div>
        <div class="srings"></div>
    </div>

    <div class="uranus">
        <div id="uranus"></div>
        <div class="urings"></div>
    </div>

    <div class="neptune"></div>

    <div class="pluto"></div>

    <div class="haumea"></div>
    <div class="makemake"></div>
    <div class="eris"></div>

</div>
</body>
</html>
