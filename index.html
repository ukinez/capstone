<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="source">
    <h2>Source code: <a href="https://github.com/ukinez/capstone/">https://github.com/ukinez/capstone/</a></h2>
</div>

<div class="credit">

</div>
    
<div class="container">
    <div class="sun"></div>
    
    <div class="mercury"></div>
    
    <div class="venus"></div>
    
    
    <div class="earth">

        <div class="phobos"></div>
        <div class="deimos"></div>
    </div>

    <div class="asteroidbelt1"></div>
    <div class="asteroidbelt2"></div>
    <div class="asteroidbelt3"></div> 
    <div class="ceres"></div>

    <div class="jupiter"></div>

    <div class="saturn">
        <div class="srings"></div>
    </div>

    <div class="uranus">
        <div class="urings"></div>
    </div>

    <div class="neptune"></div>

    <div class="pluto"></div>

    <div class="haumea"></div>
    <div class="makemake"></div>
    <div class="eris"></div>
